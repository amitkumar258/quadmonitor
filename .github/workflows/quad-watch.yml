name: Quad Watch

on:
  schedule:
    # 06:00 UTC on the 1st and 16th of every month — roughly every 15 days.
    - cron: '0 6 1,16 * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Quad Watch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/quad_watch.py

      - name: Commit updated state
        run: |
          git config user.name "quad-watch-bot"
          git config user.email "actions@github.com"
          git add data/quad_watch_state.json
          git diff --cached --quiet || git commit -m "Quad Watch: update seen-items state [skip ci]"
          git push
